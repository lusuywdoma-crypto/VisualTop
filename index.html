<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>✦ PULSE ULTRA ✦</title>
    <style>
        /* ===== СКИДАННЯ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #05050f;
            overflow: hidden;
            user-select: none;
        }

        /* ===== ФОН З АНІМАЦІЄЮ ===== */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 180, 255, 0.08), transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(168, 85, 247, 0.08), transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 212, 255, 0.04), transparent 50%),
                #05050f;
        }

        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 70%, rgba(0, 212, 255, 0.02), transparent 40%),
                radial-gradient(circle at 70% 30%, rgba(168, 85, 247, 0.02), transparent 40%);
            animation: bgPulse 6s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* ===== ЧАСТИНКИ (ЗІРКИ) ===== */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: starFloat 4s ease-in-out infinite alternate;
            opacity: 0.2;
        }

        @keyframes starFloat {
            0% { transform: translateY(0px) scale(1); opacity: 0.1; }
            100% { transform: translateY(-30px) scale(1.5); opacity: 0.5; }
        }

        /* ГЕНЕРАЦІЯ ЗІРОК ЧЕРЕЗ JS */

        /* ===== ГОЛОВНЕ ВІКНО ===== */
        .launcher {
            position: relative;
            z-index: 1;
            width: 480px;
            max-width: 94%;
            background: rgba(8, 8, 28, 0.5);
            backdrop-filter: blur(40px) saturate(300%);
            -webkit-backdrop-filter: blur(40px) saturate(300%);
            border-radius: 50px;
            border: 1.5px solid rgba(255, 255, 255, 0.04);
            box-shadow:
                0 50px 120px rgba(0, 0, 0, 0.8),
                0 0 100px rgba(0, 180, 255, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            padding: 35px 38px 38px 38px;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            animation: floatIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .launcher::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 50%, rgba(255, 255, 255, 0.005));
            pointer-events: none;
            border-radius: 50px;
        }

        .launcher::after {
            content: '';
            position: absolute;
            top: -150%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.01) 20%,
                    rgba(255, 255, 255, 0.04) 40%,
                    rgba(255, 255, 255, 0.06) 50%,
                    rgba(255, 255, 255, 0.03) 60%,
                    transparent 80%);
            transform: rotate(25deg);
            animation: shimmer 7s ease-in-out infinite;
            pointer-events: none;
            border-radius: 50px;
        }

        @keyframes shimmer {
            0% {
                transform: rotate(25deg) translateX(-120%) translateY(-120%);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: rotate(25deg) translateX(120%) translateY(120%);
                opacity: 0;
            }
        }

        /* ===== ЛОГО ===== */
        .logo {
            text-align: center;
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .logo .title {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 3s ease-in-out infinite;
            text-shadow: 0 0 80px rgba(0, 212, 255, 0.05);
        }

        .logo .sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== СТАТУС ===== */
        .status-box {
            text-align: center;
            padding: 14px;
            margin-bottom: 16px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            position: relative;
            z-index: 1;
        }

        .status-box .status-text {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.15);
        }

        .status-box .status-text .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            animation: pulseDot 1.5s ease-in-out infinite;
        }

        .status-box .status-text .dot.idle {
            background: rgba(255, 255, 255, 0.05);
            animation: none;
        }

        .status-box .status-text .dot.connecting {
            background: #ffd93d;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.2);
        }

        .status-box .status-text .dot.connected {
            background: #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2);
            animation: none;
        }

        .status-box .status-text .dot.error {
            background: #ff6b8a;
            box-shadow: 0 0 20px rgba(255, 107, 138, 0.2);
            animation: none;
        }

        @keyframes pulseDot {
            0%,100%{opacity:1;transform:scale(1);}
            50%{opacity:0.2;transform:scale(0.6);}
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="stars" id="stars"></div>

<div class="launcher">
    <div class="logo">
        <div class="title">✦ PULSE</div>
        <div class="sub">Ultra Launcher</div>
    </div>

    <div class="status-box">
        <div class="status-text">
            <span class="dot idle"></span>
            <span>Очікування запуску...</span>
        </div>
    </div>
</div>

<script>
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    starsContainer.appendChild(star);
}
</script>

</body>
</html>
