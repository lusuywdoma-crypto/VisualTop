<!DOCTYPE html>
<html>
<head>
  <title>✦ Pulse Launcher ✦</title>
  <style>
    /* ===== ЗАГАЛЬНІ ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    /* ===== ФОН ===== */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, #0d0d2b, #000000);
      z-index: 0;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.03), transparent 60%),
                  radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.03), transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    /* ===== ВІКНО ===== */
    .launcher {
      position: relative;
      z-index: 1;
      width: 440px;
      max-width: 94%;
      background: rgba(10, 10, 35, 0.55);
      backdrop-filter: blur(32px) saturate(250%);
      -webkit-backdrop-filter: blur(32px) saturate(250%);
      border-radius: 40px;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7),
                  0 0 80px rgba(0, 180, 255, 0.04);
      padding: 30px 32px 32px 32px;
      transition: all 0.4s ease;
      overflow: hidden;
    }

    .launcher::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 50%, rgba(255, 255, 255, 0.01));
      pointer-events: none;
      border-radius: 40px;
    }

    .launcher::after {
      content: '';
      position: absolute;
      top: -150%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(135deg,
        transparent 0%,
        rgba(255,255,255,0.02) 30%,
        rgba(255,255,255,0.06) 45%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 60%,
        transparent 70%
      );
      transform: rotate(25deg);
      animation: shimmer 8s ease-in-out infinite;
      pointer-events: none;
      border-radius: 40px;
    }

    @keyframes shimmer {
      0% { transform: rotate(25deg) translateX(-120%) translateY(-120%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: rotate(25deg) translateX(120%) translateY(120%); opacity: 0; }
    }

    /* ===== ЛОГО ===== */
    .logo {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .logo .title {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientMove 4s ease-in-out infinite;
    }

    .logo .sub {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== ФОРМА ===== */
    .form {
      position: relative;
      z-index: 1;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(255, 255, 255, 0.02);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .form-group input:focus {
      border-color: rgba(0, 212, 255, 0.15);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.03);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.08);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 14px 18px;
      border-radius: 18px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(168, 85, 247, 0.08));
      border: 1px solid rgba(0, 212, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.15));
      border-color: rgba(0, 212, 255, 0.15);
      color: #fff;
      transform: scale(1.01);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.04);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .error {
      color: #ff6b8a;
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
      min-height: 20px;
    }

    /* ===== МЕНЮ ===== */
    .menu {
      display: none;
      position: relative;
      z-index: 1;
    }

    .menu .welcome {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .menu .welcome strong {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 700;
    }

    /* ===== ТОГЛЕР ===== */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .toggle {
      width: 48px;
      height: 26px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      position: relative;
    }

    .toggle .knob {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      position: absolute;
      top: 2px;
      left: 2px;
      transition: all 0.3s ease;
    }

    .toggle.active .knob {
      left: 24px;
      background: rgba(0, 212, 255, 0.6);
    }

    /* ===== ІГРИ ===== */
    .game-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-btn {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.03);
      color: #fff;
      text-decoration: none;
    }

    .game-icon { margin-right: 16px; }

    .game-status {
      margin-left: auto;
      font-size: 12px;
      color: #4ade80;
    }

    .logout-btn {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,50,50,0.02);
      color: rgba(255,100,100,0.3);
      border: 1px solid rgba(255,50,50,0.02);
    }
  </style>
</head>

<body>
<div class="bg"></div>

<div class="launcher" id="launcher">
  <div class="logo">
    <div class="title">✦ PULSE</div>
    <div class="sub">Launcher • v3.0</div>
  </div>

  <div class="form" id="authForm">
    <div class="form-group">
      <label>Username</label>
      <input id="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" />
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" id="loginBtn">Login</button>
      <button class="btn btn-primary" id="registerBtn">Register</button>
    </div>

    <div class="error" id="errorMsg"></div>
  </div>

  <div class="menu" id="menu">
    <div class="welcome">Welcome <strong id="userDisplay"></strong></div>

    <div class="toggle-row">
      <span>PulseMarker</span>
      <div class="toggle" id="markerToggle"><div class="knob"></div></div>
    </div>

    <div class="game-list">
      <a class="game-btn" href="https://www.roblox.com/games/142823291/Murder-Mystery-2" target="_blank">
        <span class="game-icon">🔪</span>
        <span>Murder Mystery 2</span>
        <span class="game-status">Play</span>
      </a>
    </div>

    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<script>
  const authForm = document.getElementById('authForm');
  const menu = document.getElementById('menu');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const userDisplay = document.getElementById('userDisplay');
  const errorMsg = document.getElementById('errorMsg');
  const markerToggle = document.getElementById('markerToggle');

  function showMenu(name) {
    authForm.style.display = 'none';
    menu.style.display = 'block';
    userDisplay.textContent = name;
  }

  function logout() {
    authForm.style.display = 'block';
    menu.style.display = 'none';
  }

  loginBtn.onclick = () => showMenu(username.value);
  registerBtn.onclick = () => showMenu(username.value);
  logoutBtn.onclick = logout;

  let marker = false;
  markerToggle.onclick = () => {
    marker = !marker;
    markerToggle.classList.toggle('active', marker);
  };
</script>

</body>
</html>
